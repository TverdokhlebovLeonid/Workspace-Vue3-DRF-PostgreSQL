name: workspace

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workspace_app}
      POSTGRES_USER: ${POSTGRES_USER:-workspace_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workspace_password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U workspace_user -d workspace_app']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
    ports:
      - '${BACKEND_PORT:-8000}:8000'

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - '${FRONTEND_PORT:-8080}:80'

volumes:
  postgres_data:
